<!-- Events & Places -->
<script>
(function(){
  'use strict';

  var EVENTS_URL  = '/jsonassets/events.json';
  var PLACES_URL  = '/jsonassets/places.json';
  var PLACES_CAP  = 12;
  var EVENTS_CAP  = 8;
  var WEEKDAYS    = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

  /* ── helpers ── */
  function esc(str){
    return String(str||'').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function formatHour(h){
    if(h === undefined || h === null) return '—';
    var h24   = Math.floor(h);
    var mins  = Math.round((h - h24) * 60);
    var ampm  = h24 >= 12 ? 'pm' : 'am';
    var h12   = h24 % 12 || 12;
    return h12 + ':' + (mins < 10 ? '0' : '') + mins + ' ' + ampm;
  }

  /* ── event helpers ── */
  function enrichEvent(ev){
    var now        = new Date();
    var currentDay = WEEKDAYS[now.getDay()];
    var hour       = now.getHours() + now.getMinutes() / 60;
    var eventDay   = ev.eventday.toLowerCase();
    var start      = ev.eventstart, end = ev.eventend;
    var dayDiff    = (WEEKDAYS.indexOf(eventDay) - WEEKDAYS.indexOf(currentDay) + 7) % 7;

    var startDate  = new Date(now);
    startDate.setDate(now.getDate() + dayDiff);
    startDate.setHours(Math.floor(start), Math.round((start % 1) * 60), 0, 0);

    var endDate = new Date(startDate);
    endDate.setHours(Math.floor(end), Math.round((end % 1) * 60), 0, 0);
    if(end < start) endDate.setDate(endDate.getDate() + 1);

    var isActive      = (now >= startDate && now <= endDate);
    var remainingMs   = endDate - now;
    var startsInMs    = startDate - now;
    return Object.assign({}, ev, {isActive: isActive, remainingMs: remainingMs, startsInMs: startsInMs});
  }

  function getSortedEvents(events){
    var enriched = events.map(enrichEvent);
    enriched.sort(function(a, b){
      if(a.isActive && !b.isActive) return -1;
      if(!a.isActive && b.isActive) return 1;
      if(a.isActive && b.isActive)  return b.remainingMs - a.remainingMs;
      return a.startsInMs - b.startsInMs;
    });
    return enriched.slice(0, EVENTS_CAP);
  }

  /* ── render events ── */
  function renderFeaturedEvents(events){
    var container = document.getElementById('featuredEventsContainer');
    if(!container) return;
    var loading = document.getElementById('eventsLoading');
    if(loading) loading.remove();
    if(!events.length){
      container.innerHTML = '<p style="color:#4a5568;font-size:.9rem;margin:.5rem 0;">No events scheduled right now.</p>';
      return;
    }
    var top = getSortedEvents(events);
    top.forEach(function(ev){
      var card = document.createElement('div');
      card.className = 'event-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.innerHTML =
        '<div class="event-day-badge">' + esc(ev.eventday) + '</div>' +
        '<div class="event-name">'      + esc(ev.name)     + '</div>' +
        '<div class="event-place"><i class="fas fa-map-marker-alt" style="color:var(--orange);margin-right:.3rem;"></i>' + esc(ev.place) + '</div>' +
        '<div class="event-time">'      + formatHour(ev.eventstart) + ' &ndash; ' + formatHour(ev.eventend) + '</div>' +
        '<div class="event-status">'    + (ev.isActive ? '🔵 happening now' : '⏳ upcoming') + '</div>';
      card.addEventListener('click', function(){ showModal('event', ev); });
      card.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); showModal('event', ev); } });
      container.appendChild(card);
    });
  }

  /* ── render places ── */
  function renderPlaces(places){
    var container = document.getElementById('placesContainer');
    if(!container) return;
    var shown = places.slice(0, PLACES_CAP);
    if(!shown.length){
      container.innerHTML = '<p style="color:#4a5568;font-size:.9rem;margin:.5rem 0;">No places listed yet.</p>';
      return;
    }
    shown.forEach(function(place){
      var imgSrc = place.image || '/assets/placeholder.webp';
      var card   = document.createElement('div');
      card.className = 'place-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.innerHTML =
        '<div class="place-img" style="background-image:url(\'' + esc(imgSrc) + '\');"></div>' +
        '<div class="place-info">' +
          '<div class="place-title">'    + esc(place.title)  + '</div>' +
          '<div class="place-category">' + esc(place.label)  + ' &middot; ' + esc(place.type) + '</div>' +
          '<div class="place-footer">' +
            '<span class="place-phone">' +
              (place.phone ? '<a href="tel:' + esc(place.phone) + '"><i class="fas fa-phone-alt"></i> ' + esc(place.phone.substring(0, 16)) + '</a>' : '<span style="color:#aaa;">—</span>') +
            '</span>' +
            '<span class="place-link"><i class="fas fa-map-marker-alt"></i> details</span>' +
          '</div>' +
        '</div>';
      card.addEventListener('click', function(){ showModal('place', place); });
      card.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); showModal('place', place); } });
      container.appendChild(card);
    });
  }

  /* ── modal ── */
  var _allEvents = [];
  var _placeMap  = {};

  function showModal(type, data){
    var modal    = document.getElementById('detailModal');
    var bodyDiv  = document.getElementById('modalBody');
    if(!modal || !bodyDiv) return;

    if(type === 'place'){
      var linkedEvents = _allEvents.filter(function(ev){ return ev.placeurl === data.googleurl; });
      var evListHTML   = linkedEvents.length
        ? '<ul class="event-list">' + linkedEvents.map(function(e){
            return '<li><strong>' + esc(e.name) + '</strong> &mdash; ' + esc(e.eventday) + ' ' + formatHour(e.eventstart) + '&ndash;' + formatHour(e.eventend) + '</li>';
          }).join('') + '</ul>'
        : '<p style="color:#6c757d;font-size:.85rem;">No scheduled events right now.</p>';

      bodyDiv.innerHTML =
        '<h2 style="font-size:1.8rem;color:var(--blue);margin-bottom:1rem;">' + esc(data.title) + '</h2>' +
        '<div class="detail-row"><strong>' + esc(data.label) + ' &middot; ' + esc(data.type) + '</strong>' + (data.location ? ' &middot; ' + esc(data.location) : '') + '</div>' +
        '<div class="detail-row">' +
          '<i class="fas fa-phone-alt" style="color:var(--orange);margin-right:.4rem;"></i>' + (data.phone ? '<a href="tel:' + esc(data.phone) + '" style="color:var(--blue);">' + esc(data.phone) + '</a>' : '—') + '<br>' +
          '<i class="fas fa-globe" style="color:var(--orange);margin-right:.4rem;margin-top:.3rem;"></i>' + (data.website ? '<a href="' + esc(data.website) + '" target="_blank" rel="noopener" style="color:var(--blue);">' + esc(data.website) + '</a>' : '—') +
        '</div>' +
        '<div class="detail-row"><i class="fas fa-clock" style="color:var(--orange);margin-right:.4rem;"></i> Opens ' + formatHour(data.open) + ' &middot; Closes ' + formatHour(data.closes) + (data.closedon ? '<br><small style="color:#6c757d;">' + esc(data.closedon) + '</small>' : '') + '</div>' +
        '<div class="detail-row"><strong>🎟️ Events here</strong>' + evListHTML + '</div>' +
        '<div class="detail-row"><a href="' + esc(data.googleurl) + '" target="_blank" rel="noopener" style="background:var(--blue);color:white;padding:.5rem 1.2rem;border-radius:40px;display:inline-block;text-decoration:none;font-weight:600;">🗺️ Open in Google Maps</a></div>';
    } else {
      var venue       = _placeMap[data.placeurl] || {title: data.place, phone: ''};
      var descRaw     = data.eventdesc || '';
      var isTimestamp = /^\d{4}\//.test(descRaw);
      var descHTML    = (!descRaw || isTimestamp) ? 'Live music &amp; island vibes.' : esc(descRaw);

      bodyDiv.innerHTML =
        '<h2 style="font-size:1.8rem;color:var(--blue);margin-bottom:1rem;">✨ ' + esc(data.name) + '</h2>' +
        '<div class="detail-row"><strong>📅 ' + esc(data.eventday) + '</strong> &middot; ' + formatHour(data.eventstart) + ' &ndash; ' + formatHour(data.eventend) + '</div>' +
        '<div class="detail-row">📍 <strong>' + esc(venue.title || data.place) + '</strong>' + (venue.phone ? '<br>📞 ' + esc(venue.phone) : '') + '</div>' +
        '<div class="detail-row">' + descHTML + '</div>' +
        '<div class="detail-row">' +
          '<a href="' + esc(data.placeurl) + '" target="_blank" rel="noopener" style="background:var(--orange);color:white;padding:.4rem 1rem;border-radius:30px;display:inline-block;text-decoration:none;font-weight:600;margin-right:.6rem;">🔗 View on Google Maps</a>' +
          (venue.googleurl ? '<button onclick="window._roamShowModal(\'place\',' + JSON.stringify(venue).replace(/</g,'\\u003c') + ')" style="background:var(--blue);border:none;color:white;padding:.4rem 1rem;border-radius:30px;cursor:pointer;font-weight:600;">🏝️ Venue details</button>' : '') +
        '</div>';
    }

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(){
    var modal = document.getElementById('detailModal');
    if(modal) modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  /* expose for venue details button */
  window._roamShowModal = showModal;

  /* ── init ── */
  function init(){
    var closeBtn = document.getElementById('closeModal');
    var modal    = document.getElementById('detailModal');
    if(closeBtn) closeBtn.addEventListener('click', closeModal);
    if(modal)    modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });

    Promise.all([
      fetch(EVENTS_URL, {cache: 'no-store'}).then(function(r){ if(!r.ok) throw new Error('events '+r.status); return r.json(); }),
      fetch(PLACES_URL, {cache: 'no-store'}).then(function(r){ if(!r.ok) throw new Error('places '+r.status); return r.json(); })
    ]).then(function(results){
      var events = results[0] || [];
      var places = results[1] || [];

      _allEvents = events;
      places.forEach(function(p){ _placeMap[p.googleurl] = p; });

      renderFeaturedEvents(events);
      renderPlaces(places);
    }).catch(function(err){
      console.error('RoamAXA homepage load error:', err);
      var el = document.getElementById('eventsLoading');
      if(el) el.textContent = 'Unable to load events.';
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
